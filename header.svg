<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=DM+Sans:wght@400;500;600&amp;display=swap');
      
      .bg { fill: #121212; }
      
      .title { 
        font-family: 'Syne', -apple-system, sans-serif; 
        font-weight: 800; 
        font-size: 72px; 
        fill: #FFFFFF; 
        letter-spacing: -2px; 
      }
      .accent { fill: #5A9BF5; }
      
      .subtitle { 
        font-family: 'DM Sans', -apple-system, sans-serif; 
        font-weight: 600; 
        font-size: 18px; 
        fill: #FFFFFF; 
        letter-spacing: 0.05em; 
      }
      
      .desc { 
        font-family: 'DM Sans', -apple-system, sans-serif; 
        font-size: 16px; 
        fill: rgba(255, 255, 255, 0.75); 
      }

      /* Animations */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes drawLine {
        from { stroke-dashoffset: 800; }
        to { stroke-dashoffset: 0; }
      }

      .anim-line {
        stroke-dasharray: 800;
        stroke-dashoffset: 800;
        animation: drawLine 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .anim-text-1 { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; }
      .anim-text-2 { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; }
      .anim-text-3 { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards; }
      .anim-text-4 { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <line x1="0" y1="24" x2="800" y2="24" stroke="#242424" stroke-width="1" class="anim-line" />
  <line x1="0" y1="276" x2="800" y2="276" stroke="#242424" stroke-width="1" class="anim-line" />

  <g transform="translate(64, 115)">
    
    <g class="anim-text-1">
      <text x="0" y="0" class="title">adriel<tspan class="accent">.</tspan></text>
    </g>

    <g class="anim-text-2">
      <rect x="4" y="35" width="28" height="4" rx="2" class="accent" />
      <text x="44" y="44" class="subtitle">iOS Developer @ Apple Developer Academy</text>
    </g>

    <g class="anim-text-3">
      <text x="4" y="88" class="desc">Developer based in Porto Alegre, studying Computer Science at UFRGS.</text>
    </g>
    <g class="anim-text-4">
      <text x="4" y="114" class="desc">I build apps and tools aiming to make life simpler and more enjoyable.</text>
    </g>
    
  </g>

</svg>
