<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%" height="100%">
  <defs>
    <style>
      /* <![CDATA[ */
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap');
      
      .bg { fill: #121212; }
      .surface { fill: #1A1A1A; }
      .border { stroke: #242424; stroke-width: 1; }
      
      .section-title { 
        font-family: 'Syne', -apple-system, BlinkMacSystemFont, sans-serif; 
        font-weight: 800; 
        font-size: 32px; 
        fill: #FFFFFF; 
        letter-spacing: -1px; 
      }
      .accent { fill: #5A9BF5; }
      
      .project-title { 
        font-family: 'Syne', -apple-system, BlinkMacSystemFont, sans-serif; 
        font-weight: 700; 
        font-size: 20px; 
        fill: #FFFFFF; 
      }
      
      .project-desc { 
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; 
        font-size: 14px; 
        fill: rgba(255, 255, 255, 0.75); 
      }

      .tag {
        font-family: 'Syne', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 800;
        font-size: 10px;
        fill: #5A9BF5;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      /* ]]> */
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <line x1="0" y1="24" x2="800" y2="24" class="border" />
  <line x1="0" y1="316" x2="800" y2="316" class="border" />

  <g transform="translate(64, 80)">
    <text x="0" y="0" class="section-title">latest work</text>
  </g>

  <g transform="translate(64, 120)">
    
    <g>
      <rect x="0" y="0" width="320" height="150" rx="4" class="surface border" />
      
      <g transform="translate(24, 32)">
        <text x="0" y="0" class="tag">iOS App</text>
        <text x="0" y="28" class="project-title">DopamineNews</text>
        
        <text x="0" y="56" class="project-desc">A native iOS app designed to</text>
        <text x="0" y="78" class="project-desc">recreate a physical newspaper</text>
        <text x="0" y="100" class="project-desc">experience.</text>
      </g>
      
      <path d="M280 24 L292 24 L292 36 M292 24 L280 36" fill="none" stroke="#5A9BF5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <g transform="translate(352, 0)">
      <rect x="0" y="0" width="320" height="150" rx="4" class="surface border" />
      
      <g transform="translate(24, 32)">
        <text x="0" y="0" class="tag">Mobile App</text>
        <text x="0" y="28" class="project-title">Nook</text>
        
        <text x="0" y="56" class="project-desc">A multiplatform shared</text>
        <text x="0" y="78" class="project-desc">household expense management</text>
        <text x="0" y="100" class="project-desc">tool built with Flutter.</text>
      </g>
      
      <path d="M280 24 L292 24 L292 36 M292 24 L280 36" fill="none" stroke="#5A9BF5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>

  </g>

</svg>
